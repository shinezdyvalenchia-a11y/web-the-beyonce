<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gacha Skin - Kitty Tenacity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        /* ==========================================
           1. BACKGROUND VIDEO (FULLSCREEN)
           ========================================== */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.65) 100%);
            z-index: 2;
        }

        /* ==========================================
           2. MAIN CONTAINER LAYOUT
           ========================================== */
        .gacha-viewport {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 40px;
        }

        /* ==========================================
           3. TOP BAR (TABS & CLOSE)
           ========================================== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            color: #ffd700;
        }

        .top-tabs {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #0088ff, #ff007f);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #ff007f;
            transform: scale(1.1);
        }

        /* ==========================================
           4. CENTER CARD (DIKECILKAN KANAN-KIRI)
           ========================================== */
        .main-content-area {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
        }

        /* Card Ramping Kompak */
        .banner-card {
            width: 100%;
            max-width: 550px;
            height: auto;
            min-height: 220px;
            background: rgba(15, 15, 25, 0.65);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
            text-align: center;
            align-items: center;
        }

        .series-badge {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .series-title {
            font-size: 26px;
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(to right, #ffffff, #ff7700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .series-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.4;
            max-width: 420px;
        }

        .guarantee-box {
            background: rgba(255, 0, 127, 0.2);
            border: 1px solid rgba(255, 0, 127, 0.5);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            color: #ff99dd;
            margin-top: 4px;
        }

        /* Slide 2: Shop View */
        .shop-container {
            display: none;
            width: 100%;
            max-width: 650px;
            height: 320px;
            background: rgba(15, 15, 20, 0.75);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 20px;
            overflow-y: auto;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .shop-item-title {
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }

        .shop-buy-btn {
            background: #0088ff;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        /* ==========================================
           5. BOTTOM BAR
           ========================================== */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .bottom-left-tools {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .currency-display {
            display: flex;
            gap: 10px;
        }

        .currency-chip {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        .currency-icon {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .icon-once { background: #ff007f; box-shadow: 0 0 6px #ff007f; }
        .icon-tb { background: #ffd700; box-shadow: 0 0 6px #ffd700; }

        .spin-actions {
            display: flex;
            gap: 12px;
        }

        .spin-btn {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s ease;
        }

        .spin-btn:hover {
            background: #ffd700;
            transform: translateY(-2px);
        }

        .spin-cost {
            font-size: 10px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media screen and (max-width: 768px) {
            .gacha-viewport { padding: 15px; }
            .header-title { display: none; }
            .bottom-bar { flex-direction: column-reverse; gap: 12px; }
            .spin-actions { width: 100%; justify-content: center; }
            .bottom-left-tools { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <!-- VIDEO BACKGROUND (Path langsung karena 1 folder dengan index.html) -->
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="latargacha.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <!-- MAIN VIEWPORT -->
    <div class="gacha-viewport">
        
        <!-- TOP BAR -->
        <header class="top-bar">
            <div class="header-title">KITTY GACHA</div>
            <nav class="top-tabs">
                <button class="tab-btn active" onclick="switchTab('gacha')">✨ Banner Gacha</button>
                <button class="tab-btn" onclick="switchTab('shop')">🛒 Toko Skin</button>
            </nav>
            <button class="close-btn" onclick="window.history.back()">✕</button>
        </header>

        <!-- CENTER CONTENT -->
        <main class="main-content-area">
            
            <!-- SLIDE 1: BANNER GACHA (Ramping & Tanpa Foto Preview) -->
            <div id="gachaView" class="banner-card">
                <span class="series-badge">Featured Banner</span>
                <h1 class="series-title">Cyberpunk Idol</h1>
                <p class="series-desc">
                    Koleksi Skin eksklusif edisi terbatas! Dapatkan latar profil neon dan efek bubble chat khusus.
                </p>
                <div class="guarantee-box">
                    ✦ Jaminan 1 Item Rare/Epic tiap 10x Spin!
                </div>
            </div>

            <!-- SLIDE 2: SHOP -->
            <div id="shopView" class="shop-container">
                <div class="shop-grid">
                    <div class="shop-item">
                        <div class="shop-item-title">Latar Teater Red</div>
                        <button class="shop-buy-btn">100 TB</button>
                    </div>
                    <div class="shop-item">
                        <div class="shop-item-title">Frame Cyberpunk</div>
                        <button class="shop-buy-btn">250 TB</button>
                    </div>
                    <div class="shop-item">
                        <div class="shop-item-title">Bubble Neon Pink</div>
                        <button class="shop-buy-btn">150 TB</button>
                    </div>
                </div>
            </div>

        </main>

        <!-- BOTTOM BAR -->
        <footer class="bottom-bar">
            <div class="bottom-left-tools">
                <button class="action-btn">Rincian</button>
                <button class="action-btn">Riwayat</button>

                <div class="currency-display">
                    <div class="currency-chip">
                        <span class="currency-icon icon-once"></span>
                        <span id="onceCount">10</span> ONCE
                    </div>
                    <div class="currency-chip">
                        <span class="currency-icon icon-tb"></span>
                        <span id="tbCount">250</span> TB
                    </div>
                </div>
            </div>

            <div class="spin-actions" id="spinButtons">
                <button class="spin-btn" onclick="doSpin(1)">
                    SPIN 1x
                    <span class="spin-cost"><span class="currency-icon icon-once"></span> 1 ONCE</span>
                </button>
                <button class="spin-btn" onclick="doSpin(10)">
                    SPIN 10x
                    <span class="spin-cost"><span class="currency-icon icon-once"></span> 10 ONCE</span>
                </button>
            </div>
        </footer>

    </div>

    <script>
        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab-btn');
            const gachaView = document.getElementById('gachaView');
            const shopView = document.getElementById('shopView');
            const spinButtons = document.getElementById('spinButtons');

            tabs.forEach(btn => btn.classList.remove('active'));

            if (tabName === 'gacha') {
                tabs[0].classList.add('active');
                gachaView.style.display = 'flex';
                shopView.style.display = 'none';
                spinButtons.style.display = 'flex';
            } else {
                tabs[1].classList.add('active');
                gachaView.style.display = 'none';
                shopView.style.display = 'block';
                spinButtons.style.display = 'none';
            }
        }

        function doSpin(amount) {
            let onceElem = document.getElementById('onceCount');
            let currentOnce = parseInt(onceElem.innerText);

            if (currentOnce >= amount) {
                onceElem.innerText = currentOnce - amount;
                alert(`Spin ${amount}x Berhasil!`);
            } else {
                alert("ONCE Token kurang!");
            }
        }
    </script>
</body>
</html>
